<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube Local Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; }
        .player-shadow { box-shadow: 0 0 50px rgba(255, 0, 0, 0.1); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0f0f0f] sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i class="fa-brands fa-youtube text-red-600 text-3xl"></i>
            <span class="text-xl font-bold tracking-tighter">MY-LOCAL-PLAYER</span>
        </div>
        <div class="text-xs text-gray-500 font-mono">Status: ซอย10จงเจริญ</div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-10 max-w-4xl">
        <div class="bg-[#181818] p-6 rounded-2xl border border-gray-800 mb-8">
            <label class="block text-sm font-medium text-gray-400 mb-2">วางลิงก์วิดีโอ YouTube:</label>
            <div class="flex gap-2">
                <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." 
                    class="w-full bg-[#0f0f0f] border border-gray-700 rounded-lg px-4 py-3 outline-none focus:border-red-600 transition">
                <button onclick="processVideo()" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-lg font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-play"></i> เล่น
                </button>
            </div>
        </div>

        <div id="videoArea" class="hidden animate-in fade-in duration-500">
            <div class="aspect-video w-full rounded-2xl overflow-hidden bg-black player-shadow border border-gray-800">
                <iframe id="mainIframe" class="w-full h-full" 
                    src="" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen></iframe>
            </div>
            <div class="mt-4 flex items-center justify-between">
                <button onclick="clearVideo()" class="text-gray-500 hover:text-white text-sm">
                    <i class="fa-solid fa-xmark"></i> ปิดเครื่องเล่น
                </button>
                <div class="text-xs text-gray-600 italic">เล่นผ่านโหมด No-Cookie (ลดโฆษณา)</div>
            </div>
        </div>
    </main>

    <script>
        function processVideo() {
            const url = document.getElementById('urlInput').value;
            const videoId = extractId(url);
            
            if (videoId) {
                const playerUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0`;
                document.getElementById('mainIframe').src = playerUrl;
                document.getElementById('videoArea').classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else {
                alert('กรุณาวาง URL ของ YouTube ให้ถูกต้องครับ');
            }
        }

        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function clearVideo() {
            document.getElementById('mainIframe').src = "";
            document.getElementById('videoArea').classList.add('hidden');
            document.getElementById('urlInput').value = "";
        }
    </script>
</body>
</html>
