<script>
const instances = [
    "https://vid.puffyan.us",
    "https://inv.nadeko.net",
    "https://invidious.sethforprivacy.com",
    "https://yewtu.be"
];

let activeInstance = instances[0];

// fetch แบบกัน timeout ทุก browser
function fetchWithTimeout(url, timeout = 5000) {
    return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject("timeout"), timeout);

        fetch(url)
            .then(res => {
                clearTimeout(timer);
                resolve(res);
            })
            .catch(err => reject(err));
    });
}

// smart fetch + cache
async function smartFetch(endpoint) {
    const cacheKey = "cache_" + endpoint;

    // 🔥 ใช้ cache (เร็วขึ้น)
    if (localStorage[cacheKey]) {
        try {
            return JSON.parse(localStorage[cacheKey]);
        } catch {}
    }

    for (let url of instances) {
        try {
            const res = await fetchWithTimeout(`${url}/api/v1/${endpoint}`);
            if (res.ok) {
                activeInstance = url;
                const data = await res.json();

                // save cache
                localStorage[cacheKey] = JSON.stringify(data);

                return data;
            }
        } catch (e) {
            console.log("fail:", url);
        }
    }

    throw new Error("ทุก server ล่ม 🔥");
}

window.onload = loadHome;

async function loadHome() {
    renderSkeleton();
    try {
        const data = await smartFetch('trending');
        displayVideos(data);
    } catch (e) {
        showError(e.message);
    }
}

async function searchVideo() {
    const query = document.getElementById('searchInput').value;
    if (!query) return;

    document.getElementById('gridTitle').innerText = `ผลการค้นหา: ${query}`;
    renderSkeleton();

    try {
        const data = await smartFetch(`search?q=${encodeURIComponent(query)}`);
        displayVideos(data);
        document.getElementById('playerContainer').classList.add('hidden');
    } catch (e) {
        showError("ค้นหาไม่สำเร็จ");
    }
}

function displayVideos(videos) {
    const grid = document.getElementById('homeGrid');
    grid.innerHTML = '';

    videos.forEach(v => {
        if (v.type !== 'video') return;

        const thumb = `https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg`;

        const div = document.createElement('div');
        div.className = 'video-card';

        div.onclick = () => playVideo(v.videoId, v.title, v.author);

        div.innerHTML = `
            <img src="${thumb}"
                 onerror="this.src='https://via.placeholder.com/320x180?text=No+Image'"
                 class="rounded-xl w-full aspect-video object-cover bg-gray-800">
            <div class="mt-3">
                <h3 class="font-bold text-sm line-clamp-2">${v.title}</h3>
                <p class="text-xs text-gray-400 mt-1">${v.author}</p>
            </div>
        `;

        grid.appendChild(div);
    });
}

function playVideo(id, title, author) {
    const iframe = document.getElementById('mainPlayer');

    // 🔥 fallback ถ้า embed เจ๊ง
    iframe.onerror = () => {
        iframe.src = `https://www.youtube.com/embed/${id}`;
    };

    iframe.src = `${activeInstance}/embed/${id}?autoplay=1`;

    document.getElementById('videoTitle').innerText = title;
    document.getElementById('videoAuthor').innerText = author;

    document.getElementById('playerContainer').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderSkeleton() {
    document.getElementById('homeGrid').innerHTML =
        Array(8).fill(0).map(() => `
        <div class="flex flex-col gap-2">
            <div class="aspect-video rounded-xl loading-shimmer"></div>
            <div class="h-4 w-3/4 rounded loading-shimmer mt-2"></div>
        </div>
    `).join('');
}

function showError(msg) {
    document.getElementById('homeGrid').innerHTML =
        `<p class="text-center text-red-500 py-10">${msg}</p>`;
}

document.getElementById('searchInput')
.addEventListener('keypress', e => {
    if (e.key === 'Enter') searchVideo();
});
</script>
