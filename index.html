<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube Premium - AdFree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; scroll-behavior: smooth; }
        .video-card:hover { transform: scale(1.03); transition: 0.3s; cursor: pointer; }
        .loading-shimmer { background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 z-50 w-full bg-[#0f0f0f]/95 backdrop-blur-sm flex items-center justify-between px-4 py-2 border-b border-[#222]">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-1 cursor-pointer" onclick="window.location.reload()">
                <i class="fa-brands fa-youtube text-red-600 text-3xl"></i>
                <span class="text-xl font-bold tracking-tighter italic">MyTube</span>
            </div>
        </div>
        <div class="flex items-center w-1/2 max-w-[600px] bg-[#121212] border border-[#303030] rounded-full px-4 overflow-hidden focus-within:border-blue-500">
            <input type="text" id="searchInput" placeholder="ค้นหาวิดีโอแบบไม่มีโฆษณา..." class="w-full bg-transparent py-2 outline-none">
            <button onclick="searchVideo()"><i class="fa-solid fa-magnifying-glass text-gray-400"></i></button>
        </div>
        <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-sm font-bold">QC</div>
    </nav>

    <main class="pt-20 px-6 pb-20 max-w-[1600px] mx-auto">
        <div id="playerSection" class="hidden mb-10">
            <div class="aspect-video w-full bg-black rounded-2xl overflow-hidden shadow-2xl border border-[#333]">
                <iframe id="mainPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            </div>
            <h2 id="playerTitle" class="mt-4 text-2xl font-bold"></h2>
        </div>

        <h2 id="gridTitle" class="text-xl font-bold mb-6 flex items-center gap-2">
            <i class="fa-solid fa-fire text-orange-500"></i> วิดีโอแนะนำ
        </h2>
        <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <script>
        const apiNodes = [
            "https://inv.tux.rs",
            "https://invidious.snopyta.org",
            "https://vid.puffyan.us",
            "https://invidious.sethforprivacy.com"
        ];
        let currentApi = apiNodes[0];

        async function apiFetch(endpoint) {
            for (let node of apiNodes) {
                try {
                    const res = await fetch(`${node}/api/v1/${endpoint}`, { signal: AbortSignal.timeout(4000) });
                    if (res.ok) { currentApi = node; return await res.json(); }
                } catch (e) { console.warn(`Node ${node} ขัดข้อง กำลังเปลี่ยน...`); }
            }
            throw new Error("เซิร์ฟเวอร์ไม่ตอบสนอง");
        }

        async function loadHome() {
            renderSkeleton();
            try {
                const data = await apiFetch('trending');
                renderVideos(data);
            } catch (e) { showError(e.message); }
        }

        async function searchVideo() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            document.getElementById('gridTitle').innerText = `ผลการค้นหา: ${query}`;
            renderSkeleton();
            try {
                const data = await apiFetch(`search?q=${encodeURIComponent(query)}`);
                renderVideos(data);
                document.getElementById('playerSection').classList.add('hidden');
            } catch (e) { showError("ค้นหาไม่สำเร็จ"); }
        }

        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = videos.filter(v => v.type === 'video').map(v => `
                <div class="video-card group" onclick="playVideo('${v.videoId}', '${v.title.replace(/'/g, "\\'")}')">
                    <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="rounded-xl w-full aspect-video object-cover bg-[#222]">
                    <div class="mt-3">
                        <h3 class="font-bold text-sm line-clamp-2">${v.title}</h3>
                        <p class="text-xs text-gray-400 mt-1">${v.author}</p>
                    </div>
                </div>
            `).join('');
        }

        function playVideo(id, title) {
            const frame = document.getElementById('mainPlayer');
            frame.src = `${currentApi}/embed/${id}?autoplay=1`;
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playerSection').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderSkeleton() {
            document.getElementById('videoGrid').innerHTML = Array(8).fill('<div class="flex flex-col gap-2"><div class="aspect-video rounded-xl loading-shimmer"></div><div class="h-4 w-3/4 rounded loading-shimmer"></div></div>').join('');
        }

        function showError(msg) {
            document.getElementById('videoGrid').innerHTML = `<p class="col-span-full text-center text-red-500 py-10">${msg}</p>`;
        }

        document.getElementById('searchInput').addEventListener('keypress', e => e.key === 'Enter' && searchVideo());
        window.onload = loadHome;
    </script>
</body>
</html>
