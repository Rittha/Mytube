<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube Stable</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { background:#0f0f0f; color:white; }
.video-card:hover { transform:scale(1.03); transition:.3s; cursor:pointer; }
</style>
</head>

<body>

<nav class="fixed top-0 w-full bg-black flex justify-between px-4 py-2 border-b border-gray-800">
    <h1 class="font-bold text-xl">MyTube</h1>

    <input id="searchInput" placeholder="ค้นหา..."
        class="bg-gray-900 px-3 py-1 rounded w-1/2">

    <button onclick="searchVideo()">🔍</button>
</nav>

<main class="pt-16 p-4">
    <div id="player" class="hidden mb-4">
        <iframe id="frame" class="w-full aspect-video"></iframe>
        <h2 id="title" class="mt-2 text-lg font-bold"></h2>
    </div>

    <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</main>

<script>
const apiList = [
    "https://vid.puffyan.us",
    "https://inv.nadeko.net",
    "https://invidious.sethforprivacy.com"
];

let api = apiList[0];

// fetch with timeout (รองรับทุก browser)
function fetchWithTimeout(url, timeout = 5000) {
    return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject("timeout"), timeout);

        fetch(url)
            .then(res => {
                clearTimeout(timer);
                resolve(res);
            })
            .catch(err => reject(err));
    });
}

// auto failover API
async function apiFetch(endpoint) {
    for (let node of apiList) {
        try {
            const res = await fetchWithTimeout(`${node}/api/v1/${endpoint}`);
            if (res.ok) {
                api = node;
                return await res.json();
            }
        } catch(e) {
            console.log("node fail:", node);
        }
    }
    throw "API ล่มทั้งหมด";
}

// โหลดหน้าแรก
async function loadHome() {
    try {
        const data = await apiFetch("trending");
        render(data);
    } catch(e) {
        document.getElementById("grid").innerHTML = "โหลดไม่ได้";
    }
}

// ค้นหา
async function searchVideo() {
    const q = document.getElementById("searchInput").value;
    if (!q) return;

    const data = await apiFetch(`search?q=${encodeURIComponent(q)}`);
    render(data);
}

// render video
function render(videos) {
    const grid = document.getElementById("grid");

    grid.innerHTML = videos
        .filter(v => v.type === "video")
        .map(v => `
        <div class="video-card" onclick="play('${v.videoId}', '${v.title.replace(/'/g,"")}')">
            <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg">
            <p>${v.title}</p>
        </div>
    `).join("");
}

// play video
function play(id, title) {
    document.getElementById("frame").src = `${api}/embed/${id}`;
    document.getElementById("title").innerText = title;
    document.getElementById("player").classList.remove("hidden");
    window.scrollTo(0,0);
}

// enter search
document.getElementById("searchInput")
.addEventListener("keypress", e => {
    if (e.key === "Enter") searchVideo();
});

loadHome();
</script>

</body>
</html>
