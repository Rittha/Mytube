<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Local Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; overflow-x: hidden; }
        .player-shadow { box-shadow: 0 0 50px rgba(255, 0, 0, 0.15); }
        /* ซ่อน Scrollbar ของ Browser */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f0f; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cc0000; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0f0f0f] sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i class="fa-brands fa-youtube text-red-600 text-3xl"></i>
            <span class="text-xl font-bold tracking-tighter">MY-LOCAL-PLAYER</span>
        </div>
        <div class="text-xs text-gray-500 font-mono">Status: ซอย10จงเจริญ (Auto-Redirect Link Active)</div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-10 max-w-4xl">
        <div class="bg-[#181818] p-6 rounded-2xl border border-gray-800 mb-8">
            <label class="block text-sm font-medium text-gray-400 mb-2">วางลิงก์วิดีโอ YouTube หรือคลิกลิงก์บนหน้าจอ:</label>
            <div class="flex gap-2">
                <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." 
                    class="w-full bg-[#0f0f0f] border border-gray-700 rounded-lg px-4 py-3 outline-none focus:border-red-600 transition text-white">
                <button onclick="processVideo()" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-lg font-bold transition flex items-center gap-2 shrink-0">
                    <i class="fa-solid fa-play"></i> เล่น
                </button>
            </div>
        </div>

        <div id="videoArea" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="aspect-video w-full rounded-2xl overflow-hidden bg-black player-shadow border border-gray-800">
                <iframe id="mainIframe" class="w-full h-full" 
                    src="" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-presentation"
                    allowfullscreen></iframe>
            </div>
            <div class="mt-4 flex items-center justify-between">
                <button onclick="clearVideo()" class="text-gray-500 hover:text-white text-sm transition">
                    <i class="fa-solid fa-xmark"></i> ปิดเครื่องเล่น
                </button>
                <div class="flex items-center gap-2">
                    <span class="px-2 py-1 bg-green-900/30 text-green-500 text-[10px] rounded border border-green-800">AD-BLOCK ACTIVE</span>
                    <div class="text-xs text-gray-600 italic">เล่นผ่านโหมด No-Cookie (ไม่มีโฆษณาคั่น)</div>
                </div>
            </div>
        </div>

        <div class="mt-20 p-6 border border-dashed border-gray-800 rounded-xl text-center">
            <p class="text-gray-500 mb-4 text-sm">ทดสอบกดลิงก์ด้านล่างนี้ (จะไม่เปิดแท็บใหม่ แต่จะมาเล่นในนี้แทน)</p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="text-blue-500 underline hover:text-blue-400">ลิงก์วิดีโอตัวอย่าง 1</a>
                <a href="https://youtu.be/jNQXAC9IVRw" class="text-blue-500 underline hover:text-blue-400">ลิงก์วิดีโอตัวอย่าง 2</a>
            </div>
        </div>
    </main>

    <script>
        // 1. ดักจับการคลิกลิงก์ทั่วทั้งหน้าจอ
        document.addEventListener('click', function(e) {
            const anchor = e.target.closest('a');
            if (anchor && anchor.href) {
                const url = anchor.href;
                
                // ตรวจสอบว่าเป็นลิงก์ YouTube หรือไม่
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    e.preventDefault(); // ห้ามเปิดแท็บใหม่
                    document.getElementById('urlInput').value = url; // ใส่ URL ในช่องค้นหา
                    processVideo(); // สั่งเล่นทันที
                }
            }
        }, true);

        // 2. ฟังก์ชันประมวลผลวิดีโอ
        function processVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const videoId = extractId(url);
            
            if (videoId) {
                // พารามิเตอร์เพื่อ Block Ads และลดสิ่งรบกวน:
                // - iv_load_policy=3 : ปิดการแจ้งเตือนในวิดีโอ
                // - rel=0 : ไม่แสดงวิดีโอแนะนำจากช่องอื่นตอนจบ
                // - modestbranding=1 : ลดโลโก้ YouTube
                const playerUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3&showinfo=0`;
                
                const iframe = document.getElementById('mainIframe');
                iframe.src = playerUrl;
                
                document.getElementById('videoArea').classList.remove('hidden');
                
                // เลื่อนหน้าจอลงมาที่เครื่องเล่น
                setTimeout(() => {
                    document.getElementById('videoArea').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            } else {
                if(url !== "") alert('กรุณาวาง URL หรือคลิกลิงก์ YouTube ให้ถูกต้องครับ');
            }
        }

        // 3. ฟังก์ชันดึง ID จาก URL
        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // 4. ล้างค่าหน้าจอ
        function clearVideo() {
            const iframe = document.getElementById('mainIframe');
            iframe.src = "";
            document.getElementById('videoArea').classList.add('hidden');
            document.getElementById('urlInput').value = "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // รองรับการกด Enter ในช่อง Input
        document.getElementById('urlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                processVideo();
            }
        });
    </script>
</body>
</html>
