<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube Pro - Ad-Free</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .sidebar-item:hover { background-color: #272727; border-radius: 10px; }
        .video-card { cursor: pointer; transition: transform 0.3s; }
        .video-card:hover { transform: scale(1.03); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #3e3e3e; border-radius: 10px; }
        .loading-shimmer { background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <nav class="fixed top-0 z-50 w-full bg-[#0f0f0f] flex items-center justify-between px-4 py-2 border-b border-[#222]">
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-bars p-2 hover:bg-gray-800 rounded-full cursor-pointer"></i>
            <div class="flex items-center gap-1 cursor-pointer" onclick="window.location.reload()">
                <i class="fa-brands fa-youtube text-red-600 text-3xl"></i>
                <span class="text-xl font-bold tracking-tighter italic">MyTube</span>
            </div>
        </div>

        <div class="flex items-center w-1/2 max-w-[600px] gap-2">
            <div class="flex w-full bg-[#121212] border border-[#303030] rounded-full overflow-hidden focus-within:border-blue-500">
                <input type="text" id="searchInput" placeholder="ค้นหา" class="w-full bg-transparent px-4 py-2 outline-none">
                <button onclick="searchVideo()" class="bg-[#222222] px-5 border-l border-[#303030] hover:bg-[#303030]">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                </button>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-sm font-bold">QC</div>
        </div>
    </nav>

    <div class="flex pt-14">
        <aside class="w-60 fixed left-0 h-screen px-3 hidden lg:block border-r border-[#222] pt-4">
            <div class="flex flex-col gap-1">
                <div class="sidebar-item p-3 flex items-center gap-5 cursor-pointer bg-[#272727] font-bold"><i class="fa-solid fa-house"></i> หน้าแรก</div>
                <div class="sidebar-item p-3 flex items-center gap-5 cursor-pointer"><i class="fa-solid fa-clock-rotate-left"></i> ประวัติการดู</div>
                <div class="sidebar-item p-3 flex items-center gap-5 cursor-pointer"><i class="fa-solid fa-thumbs-up"></i> วิดีโอที่ชอบ</div>
                <hr class="border-[#303030] my-2">
                <div class="text-xs text-gray-500 px-3 uppercase">เครื่องมือ</div>
                <div class="sidebar-item p-3 flex items-center gap-5 cursor-pointer text-blue-400" onclick="alert('กำลังเชื่อมต่อ VS Projects...')"><i class="fa-solid fa-code"></i> VS Projects</div>
            </div>
        </aside>

        <main class="lg:ml-60 w-full px-6 pt-6 pb-20">
            <div id="playerContainer" class="hidden mb-8 max-w-5xl mx-auto">
                <div class="aspect-video w-full bg-black rounded-2xl overflow-hidden shadow-2xl border border-[#333]">
                    <iframe id="mainPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
                </div>
                <div class="mt-4">
                    <h2 id="videoTitle" class="text-xl font-bold line-clamp-2"></h2>
                    <p id="videoAuthor" class="text-gray-400 mt-1"></p>
                </div>
            </div>

            <h2 id="gridTitle" class="text-xl font-bold mb-6">วิดีโอแนะนำ</h2>
            <div id="homeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-8"></div>
        </main>
    </div>

    <script>
        // รายชื่อ Server สำรอง (Invidious Instances)
        const instances = [
            "https://inv.tux.rs",
            "https://invidious.snopyta.org",
            "https://vid.puffyan.us",
            "https://invidious.sethforprivacy.com",
            "https://yewtu.be"
        ];
        
        let activeInstance = instances[0];

        // ฟังก์ชันช่วยดึงข้อมูลแบบสลับ Server อัตโนมัติ
        async function smartFetch(endpoint) {
            for (let url of instances) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000); // Timeout 5 วิ
                    const res = await fetch(`${url}/api/v1/${endpoint}`, { signal: controller.signal });
                    if (res.ok) {
                        activeInstance = url;
                        return await res.json();
                    }
                } catch (e) { console.log(`สลับจาก ${url} ไปยังเครื่องอื่น...`); }
            }
            throw new Error("เซิร์ฟเวอร์ขัดข้อง กรุณาลองใหม่");
        }

        window.onload = loadHome;

        async function loadHome() {
            renderSkeleton();
            try {
                const data = await smartFetch('trending');
                displayVideos(data);
            } catch (e) {
                document.getElementById('homeGrid').innerHTML = `<p class='text-red-500'>${e.message}</p>`;
            }
        }

        async function searchVideo() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            
            document.getElementById('gridTitle').innerText = `ผลการค้นหา: ${query}`;
            renderSkeleton();
            try {
                const data = await smartFetch(`search?q=${encodeURIComponent(query)}`);
                displayVideos(data);
                document.getElementById('playerContainer').classList.add('hidden');
            } catch (e) {
                document.getElementById('homeGrid').innerHTML = `<p class='text-red-500'>ค้นหาผิดพลาด</p>`;
            }
        }

        function displayVideos(videos) {
            const grid = document.getElementById('homeGrid');
            grid.innerHTML = '';
            videos.forEach(v => {
                if (v.type !== 'video') return;
                const div = document.createElement('div');
                div.className = 'video-card';
                div.onclick = () => playVideo(v.videoId, v.title, v.author);
                div.innerHTML = `
                    <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="rounded-xl w-full aspect-video object-cover bg-gray-800">
                    <div class="mt-3">
                        <h3 class="font-bold text-sm line-clamp-2">${v.title}</h3>
                        <p class="text-xs text-gray-400 mt-1">${v.author}</p>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function playVideo(id, title, author) {
            const iframe = document.getElementById('mainPlayer');
            // ใช้ URL จาก Server ที่เช็กแล้วว่ารันได้
            iframe.src = `${activeInstance}/embed/${id}?autoplay=1&listen=1`;
            document.getElementById('videoTitle').innerText = title;
            document.getElementById('videoAuthor').innerText = author;
            document.getElementById('playerContainer').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderSkeleton() {
            document.getElementById('homeGrid').innerHTML = Array(8).fill(0).map(() => `
                <div class="flex flex-col gap-2">
                    <div class="aspect-video rounded-xl loading-shimmer"></div>
                    <div class="h-4 w-3/4 rounded loading-shimmer mt-2"></div>
                </div>`).join('');
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchVideo();
        });
    </script>
</body>
</html>
