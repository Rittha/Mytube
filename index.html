<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Local Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; }
        .player-shadow { box-shadow: 0 0 50px rgba(255, 0, 0, 0.2); }
        /* เอฟเฟกต์ตอนกดปุ่ม */
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0f0f0f] sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i class="fa-brands fa-youtube text-red-600 text-3xl"></i>
            <span class="text-xl font-bold tracking-tighter">ขี้เมา-PLAYER</span>
        </div>
        <div class="text-xs text-gray-500 font-mono italic">Ad-Block & Auto-Link Active</div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-[#181818] p-6 rounded-2xl border border-gray-800 mb-8">
            <label class="block text-sm font-medium text-gray-400 mb-2">URL ที่กำลังเล่นอยู่:</label>
            <div class="flex gap-2">
                <input type="text" id="urlInput" placeholder="คลิกลิงก์บนหน้าจอ หรือวาง URL ที่นี่..." 
                    class="w-full bg-[#0f0f0f] border border-gray-700 rounded-lg px-4 py-3 outline-none focus:border-red-600 transition text-white">
                <button onclick="processVideo()" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-lg font-bold transition flex items-center gap-2 shrink-0">
                    <i class="fa-solid fa-play"></i> เล่น
                </button>
            </div>
        </div>

        <div id="videoArea" class="hidden">
            <div class="relative aspect-video w-full rounded-2xl overflow-hidden bg-black player-shadow border border-gray-800">
                <iframe id="mainIframe" class="w-full h-full" 
                    src="" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen></iframe>
            </div>
            <div class="mt-4 flex items-center justify-between">
                <button onclick="clearVideo()" class="text-gray-500 hover:text-white text-sm transition">
                    <i class="fa-solid fa-arrow-left"></i> กลับไปหน้าหลัก
                </button>
                <div class="text-[10px] text-gray-600 uppercase tracking-widest">No-Cookie Mode Enabled</div>
            </div>
        </div>

        <div id="contentList" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
            <p class="col-span-full text-gray-500 text-sm mb-2">วิดีโอแนะนำ (ลองกดที่นี่):</p>
            
            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="bg-[#181818] p-4 rounded-xl border border-gray-800 hover:border-red-600 transition group">
                <div class="font-bold text-gray-200 group-hover:text-red-500">รวมเพลงฮิตยุค 90's</div>
                <div class="text-xs text-gray-500">https://www.youtube.com/watch?v=dQw4w9WgXcQ</div>
            </a>

            <a href="https://www.youtube.com/watch?v=jNQXAC9IVRw" class="bg-[#181818] p-4 rounded-xl border border-gray-800 hover:border-red-600 transition group">
                <div class="font-bold text-gray-200 group-hover:text-red-500">เพลงใหม่ล่าสุด 2026</div>
                <div class="text-xs text-gray-500">https://www.youtube.com/watch?v=jNQXAC9IVRw</div>
            </a>
        </div>
    </main>

    <script>
        /**
         * 1. ฟังก์ชันดักจับการคลิกลิงก์ทั่วทั้งหน้าเว็บ (Global Interceptor)
         */
        document.addEventListener('click', function(e) {
            // ค้นหาว่าสิ่งที่คลิกคือลิงก์ (<a>) หรืออยู่ภายใต้ลิงก์หรือไม่
            const anchor = e.target.closest('a');
            
            if (anchor && anchor.href) {
                const url = anchor.href;

                // ตรวจสอบว่าเป็นลิงก์ YouTube (แบบสั้น หรือ แบบยาว)
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    // --- หัวใจสำคัญ ---
                    e.preventDefault(); // 1. ไม่ให้เปิดแท็บใหม่
                    
                    const inputField = document.getElementById('urlInput');
                    inputField.value = url; // 2. Copy ลิงก์มาวางใน Textbox
                    
                    processVideo(); // 3. รันฟังก์ชันเล่นอัตโนมัติทันที
                    
                    console.log("Auto-playing:", url);
                }
            }
        }, true);

        /**
         * 2. ฟังก์ชันประมวลผลวิดีโอและเปลี่ยนเป็น Iframe แบบไร้โฆษณา
         */
        function processVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const videoId = extractId(url);
            
            if (videoId) {
                // ใช้ No-Cookie และพารามิเตอร์เพื่อ Block โฆษณาเบื้องต้น
                const playerUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3`;
                
                document.getElementById('mainIframe').src = playerUrl;
                document.getElementById('videoArea').classList.remove('hidden');
                document.getElementById('contentList').classList.add('opacity-20'); // จางรายการแนะนำลง
                
                // เลื่อนไปที่วิดีโอ
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (url !== "") {
                alert('กรุณาใช้ลิงก์ YouTube ที่ถูกต้อง');
            }
        }

        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function clearVideo() {
            document.getElementById('mainIframe').src = "";
            document.getElementById('videoArea').classList.add('hidden');
            document.getElementById('contentList').classList.remove('opacity-20');
            document.getElementById('urlInput').value = "";
        }

        // รองรับการกด Enter ในช่อง Input
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processVideo();
        });
    </script>
</body>
</html>
